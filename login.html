<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My Wellness Web - Your wellness journey starts here.">
    <meta name="author" content="Gionata Garavani">
    <title>My Wellness</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
</head>

<body>
    <main class="login-container">
        <div class="login-card">
            <h2 class="login-title">Welcome to My Wellness Hub</h2>
            <p class="login-info">Any username and password will work. This is just to simulate a login.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
