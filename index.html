<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wellness Dashboard - Track Your Fitness & Health</title>
    <meta name="description"
        content="Welcome to the My Wellness Dashboard. Track your weekly summaries, workout progress, book treatments, and manage your health journey in one place.">
    <meta name="keywords"
        content="wellness dashboard, workout tracker, treatment booking, fitness progress, health dashboard, My Wellness">
    <meta name="author" content="Gionata Garavani">
    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
</head>

<body>
    <header class="main-header">
        <div>
            <span id="nav-logo">My Wellness</span>
        </div>
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation">
            ☰
        </button>

        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item active">Dashboard</a></li>
                <li><a href="workout.html" class="nav-item">Workout</a></li>
                <li><a href="booking.html" class="nav-item">Book a Treatment</a></li>
                <li><a href="profile.html" class="nav-item">Profile</a></li>
                <li><button class="btn-logout">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard">
        <div class="dashboard-header">
            <h2 class="dashboard-title">Good day, Fella!</h2>
        </div>

        <div class="motivation-marquee-container" id="motivation-marquee-container">
            <div class="motivation-marquee-track" id="motivation-marquee-track"></div>
        </div>

        <div class="dashboard-grid" id="dashboard-grid">
            <div class="card">
                <h3 class="card-title">Weekly Summary</h3>
                <div class="card-body">
                    <p>No workout scheduled</p>
                </div>
                <div class="card-footer">
                    <button class="btn-primary" onclick="location.href='workout.html'">Start Workout</button>
                </div>
            </div>

            <div class="card booking-card">
                <h3 class="card-title">Swedish Massage</h3>
                <div class="card-body">
                    <div class="booking-details">
                        <div class="booking-info-row">
                            <span class="icon">📅</span>
                            <span>Friday, Jun 5, 2026 at 14:00</span>
                        </div>
                        <div class="booking-info-row">
                            <span class="icon">👤</span>
                            <span>Therapist: Sarah Connor</span>
                        </div>
                        <div class="booking-info-row">
                            <span class="icon">⏱️</span>
                            <span>Duration: 60 min</span>
                        </div>
                        <div class="booking-info-row">
                            <span class="icon">🏷️</span>
                            <span>Status: <span class="status-badge confirmed">Confirmed</span></span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn-secondary" onclick="cancelBooking(this)">Cancel Booking</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
