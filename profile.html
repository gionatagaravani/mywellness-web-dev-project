<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Profile - My Wellness</title>
    <meta name="description"
        content="Manage your personal details, health preferences, account settings, and customize your My Wellness experience.">
    <meta name="keywords"
        content="user profile, account settings, health preferences, personal dashboard, wellness account, My Wellness profile">
    <meta name="author" content="Gionata Garavani">
    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
</head>

<body>
    <header class="main-header">
        <div>
            <span id="nav-logo">My Wellness</span>
        </div>
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation">
            ☰
        </button>

        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html" class="nav-item">Dashboard</a></li>
                <li><a href="workout.html" class="nav-item">Workout</a></li>
                <li><a href="booking.html" class="nav-item">Book a Treatment</a></li>
                <li><a href="profile.html" class="nav-item active">Profile</a></li>
                <li><button class="btn-logout">Logout</button></li>
            </ul>
        </nav>
    </header>

    <main class="dashboard">
        <div class="dashboard-header">
            <h2 class="dashboard-title">Your Profile</h2>
        </div>
        <div class="dashboard-grid">
            <!-- Left Card: Profile Summary -->
            <div class="card" style="flex: 1; min-width: 300px;">
                <h3 class="card-title">Overview</h3>
                <div class="card-body">
                    <div class="profile-avatar-container">
                        <div class="profile-avatar" id="summary-avatar">👤</div>
                        <h4 id="summary-username"
                            style="font-size: 1.25rem; font-weight: 600; margin-top: 0.5rem; text-align: center;">
                            Username</h4>
                        <p id="summary-email" style="color: #777; margin-bottom: 1rem; text-align: center;">
                            mail@example.com</p>
                    </div>
                    <div class="booking-details"
                        style="border-top: 1px solid #eee; padding-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem;">
                        <div class="booking-info-row">
                            <span class="icon">🎯</span>
                            <span>Fitness Goal: <strong id="summary-goal">Stay Healthy</strong></span>
                        </div>
                        <div class="booking-info-row" style="align-items: flex-start;">
                            <span class="icon">📝</span>
                            <span id="summary-bio" style="font-style: italic; color: #555; line-height: 1.4;">Fitness
                                enthusiast and spa lover.</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Card: Profile Editor Form -->
            <div class="card" style="flex: 2; min-width: 320px;">
                <h3 class="card-title">Edit Details</h3>
                <div class="card-body">
                    <form id="profile-form">
                        <div class="form-group">
                            <label style="font-weight: 500; color: #333;">Choose Avatar</label>
                            <div class="avatar-picker">
                                <button type="button" class="avatar-option" data-avatar="👤">👤</button>
                                <button type="button" class="avatar-option" data-avatar="🏋️‍♂️">🏋️‍♂️</button>
                                <button type="button" class="avatar-option" data-avatar="🧘‍♀️">🧘‍♀️</button>
                                <button type="button" class="avatar-option" data-avatar="🏃‍♂️">🏃‍♂️</button>
                                <button type="button" class="avatar-option" data-avatar="🍎">🍎</button>
                                <button type="button" class="avatar-option" data-avatar="🥦">🥦</button>
                                <button type="button" class="avatar-option" data-avatar="💤">💤</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="profile-username" style="font-weight: 500; color: #333;">Username / Display
                                Name</label>
                            <input type="text" id="profile-username" required>
                        </div>
                        <div class="form-group">
                            <label for="profile-email" style="font-weight: 500; color: #333;">Email Address</label>
                            <input type="email" id="profile-email" required>
                        </div>
                        <div class="form-group">
                            <label for="profile-goal" style="font-weight: 500; color: #333;">Fitness Goal</label>
                            <select id="profile-goal">
                                <option value="Stay Healthy">Stay Healthy</option>
                                <option value="Lose Weight">Lose Weight</option>
                                <option value="Gain Muscle">Gain Muscle</option>
                                <option value="Improve Endurance">Improve Endurance</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="profile-bio" style="font-weight: 500; color: #333;">Bio / About Me</label>
                            <textarea id="profile-bio" rows="4"></textarea>
                        </div>
                        <div class="card-footer" style="display: flex; gap: 1rem; padding-top: 1rem;">
                            <button type="submit" class="btn-primary" style="flex: 1;">Save Changes</button>
                            <button type="button" id="btn-reset" class="btn-secondary-outline"
                                style="flex: 1;">Reset</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
